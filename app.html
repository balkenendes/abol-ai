    // Hash email with SHA-256 before storing
    async function hashEmail(email) {
      if (!email) return null;
      const encoder = new TextEncoder();
      const data = encoder.encode(email.toLowerCase());
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Save a new assessment to Supabase (called on form submit)
    async function saveAssessment(formData) {
      if (!supabase) { console.warn("Supabase not loaded"); return null; }
      const emailHash = await hashEmail(formData.email);
      const { data, error } = await supabase
        .from('abol_assessments')
        .insert({
          sector: formData.sector,
          employee_bucket: formData.emp,
          revenue: formData.revenue,
          countries: formData.countries,
          email: formData.email,
          email_hash: emailHash,
          organization: formData.org,
          job_title: formData.jobTitle,
          status: 'in_progress'
        })
        .select('id')
        .single();
      if (error) { console.error("Save assessment error:", error); return null; }
      console.log("Assessment created:", data.id);
      return data.id;
    }

    // Update answers as quiz progresses (called after each answer)
    async function updateAnswers(assessmentId, answers) {
      if (!supabase || !assessmentId) return;
      const { error } = await supabase
        .from('abol_assessments')
        .update({ answers })
        .eq('id', assessmentId);
      if (error) console.error("Update answers error:", error);
    }

    // Save final scores and mark as completed
    async function completeAssessment(assessmentId, result) {
      if (!supabase || !assessmentId) return;
      const { error } = await supabase
        .from('abol_assessments')
        .update({
          dimension_scores: result.dimensions,
          overall_percentage: result.overall_percentage,
          overall_rating: result.rating,
          status: 'completed',
          completed_at: new Date().toISOString()

        .eq('id', assessmentId);
      if (error) console.error("Complete assessment error:", error);
      else console.log("Assessment completed:", assessmentId);
    }

      const { data, error } = await supabase
        .from('abol_public_scores')
        .select('dimension_scores, overall_percentage')
        .eq('sector', sector);
      if (error || !data || data.length < 3) return null;
      // Compute median overall
      const scores = data.map(d => d.overall_percentage).sort((a, b) => a - b);
      const median = scores[Math.floor(scores.length / 2)];
      return { peer_count: data.length, peer_median: median };

    // Sector weight multipliers — 7 dimensions
    const SECTOR_WEIGHTS = {
      smb:                { readiness: 1.0, security_measures: 1.5, dependencies: 1.0, investment: 1.3, compliance: 1.2, governance: 1.0, resilience: 1.4 },
      corporate:          { readiness: 1.5, security_measures: 1.5, dependencies: 1.8, investment: 1.0, compliance: 2.0, governance: 1.8, resilience: 1.5 },
      financial_services: { readiness: 2.5, security_measures: 1.5, dependencies: 2.2, investment: 1.2, compliance: 3.0, governance: 2.5, resilience: 2.0 }
    };

    function computeRating(pct) {
      if (pct >= 85) return "Leader";
      if (pct >= 70) return "Strong";
      if (pct >= 50) return "Fair";
      if (pct >= 30) return "At Risk";
      return "Critical";
    }

    function computeResults(answers, sector) {
      const weights = SECTOR_WEIGHTS[sector] || SECTOR_WEIGHTS.smb;
      const dimScores = {};

      // Aggregate per dimension
      for (const q of DEMO_QUESTIONS) {
        const a = answers[q.question_id];
        if (a === undefined) continue;
        const opt = q.options.find(o => String(o.value) === String(a));
        const raw = opt ? opt.score : 0;
        const w = weights[q.dimension] || 1.0;
        if (!dimScores[q.dimension]) dimScores[q.dimension] = { weighted: 0, maxWeighted: 0 };
        dimScores[q.dimension].weighted += raw * w;
        dimScores[q.dimension].maxWeighted += 100 * w;
      }

      let totalW = 0, totalMax = 0;
      const dimensions = {};
      for (const [dim, data] of Object.entries(dimScores)) {
        const pct = data.maxWeighted > 0 ? (data.weighted / data.maxWeighted) * 100 : 0;
        dimensions[dim] = Math.round(pct * 10) / 10;
        totalW += data.weighted;
        totalMax += data.maxWeighted;
      }

      const overall = totalMax > 0 ? (totalW / totalMax) * 100 : 0;
      const overallRound = Math.round(overall * 10) / 10;

      return {
        overall_percentage: overallRound,
        rating: computeRating(overallRound),
        sector,
        dimensions
      };
    }

                  </Card>

              </div>
                          
            </Container>
          </div>

          {/* FINAL CTA */}
          <div style={{
            padding: "72px 0", background: "var(--text)",
            position: "relative", overflow: "hidden"
          }}>
            <div style={{
              position: "absolute", inset: 0, pointerEvents: "none",
              background: "radial-gradient(ellipse at 80% 50%, rgba(232,101,10,0.25) 0%, transparent 60%)"
            }} />
            <Container maxWidth={860}>
              <div style={{ textAlign: "left", position: "relative", maxWidth: 760 }}>
                {/* Eyebrow */}
                <div style={{
                  fontSize: 11, fontFamily: "var(--font-mono)", fontWeight: 700,
                  letterSpacing: 2, textTransform: "uppercase",
                  color: "var(--accent-light)", marginBottom: 18
                }}>
                  &mdash; 15 minutes from here
                </div>

                <h2 style={{
                  fontSize: 46, fontWeight: 800, color: "#fff",
                  letterSpacing: -1.8, lineHeight: 1.05, marginBottom: 20
                }}>
                  You&rsquo;ve seen the problem.<br />
                  <span style={{ color: "var(--accent-light)" }}>Now get your number.</span>
                </h2>

                <p style={{
                  fontSize: 17, color: "rgba(255,255,255,0.75)",
                  lineHeight: 1.55, marginBottom: 32, maxWidth: 620
                }}>
                  Your next board meeting is on the calendar. Your insurer is asking questions.
                  Your NIS2 audit window is closing. Walk into all three with your quantified
                  exposure, your gap to peers, and the investment case your CFO will actually sign off.
                </p>

                <div style={{ display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
                  <Btn onClick={onStart} style={{
                    background: "var(--accent)", border: "1px solid var(--accent)",
                    padding: "16px 28px", fontSize: 15
                  }}>
                    Start your free assessment
                  </Btn>
                  <div style={{
                    fontSize: 11, color: "rgba(255,255,255,0.5)",
                    fontFamily: "var(--font-mono)", letterSpacing: 1, textTransform: "uppercase"
                  }}>
                    Free &middot; 15 min &middot; Confidential &middot; No vendor pitch
                  </div>
                </div>
              </div>
                          
            </Container>
          </div>

          {/* FOOTER */}
          <div style={{ padding: "32px 0", borderTop: "1px solid var(--border-subtle)", background: "var(--bg-raised)" }}>
            <Container maxWidth={860}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "var(--text-muted)", flexWrap: "wrap", gap: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 600 }}>
                  <div style={{ width: 20, height: 20, borderRadius: 4, background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 800 }}>A</div>
                  ABOL.ai &middot; AI and Quantum Security Index
                </div>
                <div style={{ display: "flex", gap: 24 }}>
                  <span>Methodology</span>
                  <span>Privacy</span>
                  <span>Contact</span>
                </div>
              </div>
                          
            </Container>
          </div>
        </div>
      );
    }

    // =====================================================================
    // START FORM
    // =====================================================================
    function StartForm({ onSubmit, onBack }) {
      const [sector, setSector] = useState("");
      const [emp, setEmp] = useState("");
      const [revenue, setRevenue] = useState("");
      const [countries, setCountries] = useState([]);
      const [countrySearch, setCountrySearch] = useState("");
      const [countryOpen, setCountryOpen] = useState(false);
      const [email, setEmail] = useState("");
      const [org, setOrg] = useState("");
      const [jobTitle, setJobTitle] = useState("");
      const countryRef = useRef(null);

      // Close dropdown on outside click
      useEffect(() => {
        const handler = (e) => {
          if (countryRef.current && !countryRef.current.contains(e.target)) setCountryOpen(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      const toggleCountry = (code) => {
        setCountries(prev => prev.includes(code) ? prev.filter(c => c !== code) : [...prev, code]);
      };

      const toggleRegion = (regionCountries) => {
        const codes = regionCountries.map(c => c.value);
        const allSelected = codes.every(c => countries.includes(c));
        if (allSelected) {
          setCountries(prev => prev.filter(c => !codes.includes(c)));
        } else {
          setCountries(prev => [...new Set([...prev, ...codes])]);
        }
      };

      const getCountryLabel = (code) => {
        for (const r of REGIONS) {
          const found = r.countries.find(c => c.value === code);
          if (found) return found.label;
        }
        return code;
      };

      const filteredRegions = REGIONS.map(r => ({
        ...r,
        countries: r.countries.filter(c =>
          c.label.toLowerCase().includes(countrySearch.toLowerCase()) ||
          c.value.toLowerCase().includes(countrySearch.toLowerCase())
        )
      })).filter(r => r.countries.length > 0);

      // Progress calculation
      const totalFields = 7;
      const filledFields = [sector, emp, revenue, countries.length > 0 ? "x" : "", org, email, jobTitle].filter(Boolean).length;
      const progress = Math.round((filledFields / totalFields) * 100);
      const isComplete = !sector || !emp || !revenue || countries.length === 0 || !org || !email || !jobTitle;

      // Helper styles
      const inp = {
        width: "100%", padding: "12px 14px",
        background: "#fff", border: "1px solid var(--border)",
        borderRadius: 6, color: "var(--text)", fontSize: 14, outline: "none",
        fontFamily: "var(--font-body)", transition: "all 0.15s",
        boxShadow: "0 1px 2px rgba(20,17,15,0.03)"
      };

      const sectionLabel = {
        display: "flex", alignItems: "center", gap: 8,
        fontSize: 13, fontWeight: 700, color: "var(--text)",
        marginBottom: 4
      };

      const sectionHint = {
        fontSize: 12, color: "var(--text-muted)", marginBottom: 14,
        fontWeight: 400, lineHeight: 1.5
      };

      const numberBadge = (num, done) => ({
        width: 22, height: 22, borderRadius: 6, flexShrink: 0,
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        fontSize: 11, fontWeight: 800,
        background: done ? "var(--sage)" : "var(--accent-lighter)",
        color: done ? "#fff" : "var(--accent-dark)",
        border: done ? "1px solid var(--sage)" : "1px solid var(--accent)"
      });

      // Tile button style helper (reusable for sector, emp, revenue)
      const tileStyle = (selected) => ({
        padding: "14px 14px", textAlign: "left", cursor: "pointer",
        background: selected ? "var(--accent-lighter)" : "#fff",
        border: "1px solid " + (selected ? "var(--accent)" : "var(--border)"),
        borderRadius: 6,
        color: "var(--text)",
        transition: "all 0.15s",
        boxShadow: selected ? "0 2px 8px rgba(232,101,10,0.15)" : "0 1px 2px rgba(20,17,15,0.03)",
        fontFamily: "var(--font-body)"
      });

      // Chip button (for job titles, quick regions)
      const chipStyle = (selected) => ({
        padding: "7px 14px", fontSize: 13, fontWeight: 600,
        borderRadius: 20, cursor: "pointer",
        background: selected ? "var(--accent)" : "#fff",
        border: "1px solid " + (selected ? "var(--accent)" : "var(--border)"),
        color: selected ? "#fff" : "var(--text-secondary)",
        transition: "all 0.15s",
        fontFamily: "var(--font-body)",
        boxShadow: selected ? "0 2px 6px rgba(232,101,10,0.25)" : "none"
      });

      const sectorLabel = SECTORS.find(s => s.value === sector)?.label;
      const empLabel = EMP_BUCKETS.find(b => b.value === emp)?.label;
      const revenueOpts = [
        { value: "under_10m", label: "< €10M", tag: "Micro" },
        { value: "10m_50m", label: "€10M–50M", tag: "Small" },
        { value: "50m_100m", label: "€50M–100M", tag: "Mid-Small" },
        { value: "100m_250m", label: "€100M–250M", tag: "Mid" },
        { value: "250m_500m", label: "€250M–500M", tag: "Upper-Mid" },
        { value: "500m_1b", label: "€500M–1B", tag: "Large" },
        { value: "1b_5b", label: "€1B–5B", tag: "Enterprise" },
        { value: "5b_20b", label: "€5B–20B", tag: "Global" },
        { value: "over_20b", label: "€20B+", tag: "Mega-Cap" }
      ];
      const revenueLabel = revenueOpts.find(r => r.value === revenue)?.label;

            <Container>
              <div style={{ padding: "12px 0", display: "flex", alignItems: "center", gap: 16 }}>
                <button onClick={onBack} style={{
                  background: "none", border: "none", color: "var(--text-muted)", fontSize: 12,
                  fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6
                }}>{"\u2190"} Back</button>
                <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--text-muted)", fontWeight: 600, letterSpacing: 1 }}>STEP 1 OF 2</span>
                  <div style={{ flex: 1, height: 4, background: "var(--bg-surface)", borderRadius: 2, overflow: "hidden", maxWidth: 240 }}>
                    <div style={{ height: "100%", width: progress + "%", background: "var(--accent)", borderRadius: 2, transition: "width 0.3s" }} />
                  </div>
                  <span style={{ fontSize: 11, fontFamily: "var(--font-mono)", color: "var(--accent-dark)", fontWeight: 700 }}>{filledFields}/{totalFields}</span>
                </div>
              </div>
            </Container>
          </div>

          <Container>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 40, padding: "40px 0 80px", alignItems: "start" }}>

              {/* MAIN FORM */}
              <div className="slide-up">
                <h1 style={{ fontSize: 36, fontWeight: 800, color: "var(--text)", marginBottom: 10, letterSpacing: -1, lineHeight: 1.1 }}>
                  Your organization
                </h1>
                <p style={{ fontSize: 15, color: "var(--text-secondary)", marginBottom: 36, lineHeight: 1.6, maxWidth: 560 }}>
                  We calibrate your score to your sector, size, and regulatory footprint. Financial services and critical infrastructure face stricter weighting.
                </p>

                {/* SECTION 1: Sector */}
                <Card style={{ marginBottom: 16, padding: 24 }}>
                  <div style={sectionLabel}>
                    <span style={numberBadge(1, !!sector)}>{sector ? "\u2713" : "1"}</span>
                    Which sector are you in?
                  </div>
                  <div style={sectionHint}>Used to weight regulatory and industry-specific risk factors.</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                    {SECTORS.map(s => (
                      <button key={s.value} type="button" onClick={() => setSector(s.value)} style={tileStyle(sector === s.value)}>
                        <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4, color: sector === s.value ? "var(--accent-dark)" : "var(--text)" }}>{s.label}</div>
                        <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 500 }}>{s.desc}</div>
                      </button>
                    ))}
                  </div>
                </Card>

                {/* SECTION 2: Size */}
                <Card style={{ marginBottom: 16, padding: 24 }}>
                  <div style={sectionLabel}>
                    <span style={numberBadge(2, !!emp)}>{emp ? "\u2713" : "2"}</span>
                    How many employees?
                  </div>
                  <div style={sectionHint}>Size buckets help us benchmark you against companies of similar scale.</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8 }}>
                    {EMP_BUCKETS.map(b => (
                      <button key={b.value} type="button" onClick={() => setEmp(b.value)} style={{
                        ...tileStyle(emp === b.value),
                        padding: "12px 8px", textAlign: "center",
                        fontSize: 13, fontWeight: 600,
                        color: emp === b.value ? "var(--accent-dark)" : "var(--text-secondary)"
                      }}>{b.label}</button>
                    ))}
                  </div>
                </Card>

                {/* SECTION 3: Revenue */}
                <Card style={{ marginBottom: 16, padding: 24 }}>
                  <div style={sectionLabel}>
                    <span style={numberBadge(3, !!revenue)}>{revenue ? "\u2713" : "3"}</span>
                    Annual revenue
                  </div>
                  <div style={sectionHint}>A proxy for attack surface and regulatory exposure.</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                    {revenueOpts.map(r => (
                      <button key={r.value} type="button" onClick={() => setRevenue(r.value)} style={{
                        ...tileStyle(revenue === r.value), padding: "10px 10px", textAlign: "center"
                      }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: revenue === r.value ? "var(--accent-dark)" : "var(--text)" }}>{r.label}</div>
                        {r.tag && <div style={{ fontSize: 10, marginTop: 3, color: "var(--text-muted)", fontWeight: 500 }}>{r.tag}</div>}
                      </button>
                    ))}
                  </div>
                </Card>

                {/* SECTION 4: Countries */}
                <Card style={{ marginBottom: 16, padding: 24, position: "relative", zIndex: countryOpen ? 40 : "auto" }}>
                  <div style={sectionLabel}>
                    <span style={numberBadge(4, countries.length > 0)}>{countries.length > 0 ? "\u2713" : "4"}</span>
                    Operating countries
                  </div>
                  <div style={sectionHint}>Select all regions where you process data or deliver services.</div>

                  <div ref={countryRef} style={{ position: "relative" }}>
                    {/* Selected tags + trigger */}
                    <div
                      onClick={() => setCountryOpen(!countryOpen)}
                      style={{
                        ...inp, cursor: "pointer", minHeight: 52,
                        display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center",
                        padding: "10px 14px",
                        borderColor: countryOpen ? "var(--accent)" : "var(--border)",
                        boxShadow: countryOpen ? "0 0 0 3px rgba(232,101,10,0.12)" : inp.boxShadow
                      }}
                    >
                      {countries.length === 0 && (
                        <span style={{ color: "var(--text-muted)", fontSize: 14 }}>Select countries or regions\u2026</span>
                      )}
                      {countries.slice(0, 8).map(code => (
                        <span key={code} style={{
                          display: "inline-flex", alignItems: "center", gap: 6,
                          padding: "4px 8px 4px 10px", background: "var(--accent-lighter)",
                          border: "1px solid var(--accent)", borderRadius: 14,
                          fontSize: 12, color: "var(--accent-dark)", fontWeight: 600
                        }}>
                          {getCountryLabel(code)}
                          <span
                            onClick={(e) => { e.stopPropagation(); toggleCountry(code); }}
                            style={{ cursor: "pointer", opacity: 0.7, fontSize: 14, lineHeight: 1,
                              width: 14, height: 14, display: "flex", alignItems: "center", justifyContent: "center",
                              borderRadius: "50%", background: "rgba(124,45,18,0.15)" }}
                          >{"\u00D7"}</span>
                        </span>
                      ))}
                      {countries.length > 8 && (
                        <span style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 500 }}>+{countries.length - 8} more</span>
                      )}
                      <span style={{ marginLeft: "auto", color: "var(--text-muted)", fontSize: 12, fontWeight: 600 }}>
                        {countries.length > 0 ? countries.length + " selected" : "Click to select"}
                      </span>
                    </div>

                    {/* Dropdown */}
                    {countryOpen && (
                      <div style={{
                        position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50,
                        marginTop: 6, background: "#fff",
                        border: "1px solid var(--accent)", borderRadius: 8,
                        maxHeight: 400, overflow: "hidden", display: "flex", flexDirection: "column",
                        boxShadow: "0 20px 60px rgba(20,17,15,0.15)"
                      }}>
                        <div style={{ padding: "12px 14px", borderBottom: "1px solid var(--border-subtle)" }}>
                          <input
                            type="text"
                            value={countrySearch}
                            onChange={e => setCountrySearch(e.target.value)}
                            placeholder="Search countries\u2026"
                            autoFocus
                            style={{ ...inp, padding: "8px 12px", fontSize: 13, background: "var(--bg-surface)", borderColor: "var(--border)" }}
                          />
                        </div>

                        <div style={{ padding: "8px 14px", borderBottom: "1px solid var(--border-subtle)", display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {[
                            { label: "EU/EEA", codes: ["NL","BE","LU","FR","DE","AT","IT","ES","PT","GR","IE","DK","SE","FI","PL","CZ","SK","HU","RO","BG","HR","SI","EE","LV","LT","MT","CY","IS","NO","LI"] },
                            { label: "Benelux", codes: ["NL","BE","LU"] },
                            { label: "DACH", codes: ["DE","AT","CH"] },
                            { label: "Nordics", codes: ["DK","SE","NO","FI","IS"] },
                            { label: "G7", codes: ["US","GB","FR","DE","IT","CA","JP"] },
                            { label: "Five Eyes", codes: ["US","GB","CA","AU","NZ"] }
                          ].map(g => {
                            const allIn = g.codes.every(c => countries.includes(c));
                            return (
                              <button key={g.label} type="button" onClick={() => {
                                if (allIn) setCountries(prev => prev.filter(c => !g.codes.includes(c)));
                                else setCountries(prev => [...new Set([...prev, ...g.codes])]);
                              }} style={chipStyle(allIn)}>
                                {allIn ? "\u2713 " : ""}{g.label}
                              </button>
                            );
                          })}
                        </div>

                        <div style={{ overflowY: "auto", flex: 1, padding: "6px 0" }}>
                          {filteredRegions.map(r => {
                            const regionCodes = r.countries.map(c => c.value);
                            const allRegionSelected = regionCodes.every(c => countries.includes(c));
                            const someRegionSelected = regionCodes.some(c => countries.includes(c));
                            return (
                              <div key={r.region}>
                                <div
                                  onClick={() => toggleRegion(r.countries)}
                                  style={{
                                    padding: "8px 14px", cursor: "pointer",
                                    display: "flex", alignItems: "center", gap: 10,
                                    background: someRegionSelected ? "var(--bg-surface)" : "transparent",
                                    position: "sticky", top: 0, zIndex: 1,
                                    borderBottom: "1px solid var(--border-subtle)"
                                  }}
                                >
                                  <div style={{
                                    width: 16, height: 16, borderRadius: 4,
                                    border: "1.5px solid " + (allRegionSelected ? "var(--sage)" : someRegionSelected ? "var(--accent)" : "var(--border)"),
                                    background: allRegionSelected ? "var(--sage)" : "#fff",
                                    display: "flex", alignItems: "center", justifyContent: "center",
                                    fontSize: 10, color: "#fff", flexShrink: 0, fontWeight: 800
                                  }}>
                                    {allRegionSelected ? "\u2713" : someRegionSelected ? "\u2013" : ""}
                                  </div>
                                  <span style={{ fontSize: 11, fontWeight: 700, color: "var(--text)", letterSpacing: 0.5, textTransform: "uppercase" }}>{r.region}</span>
                                  <span style={{ fontSize: 11, color: "var(--text-muted)", marginLeft: "auto", fontFamily: "var(--font-mono)", fontWeight: 600 }}>
                                    {regionCodes.filter(c => countries.includes(c)).length}/{regionCodes.length}
                                  </span>
                                </div>
                                <div style={{ display: "flex", flexWrap: "wrap", padding: "10px 14px 14px", gap: 6 }}>
                                  {r.countries.map(c => {
                                    const sel = countries.includes(c.value);
                                    return (
                                      <button key={c.value} type="button" onClick={() => toggleCountry(c.value)} style={{
                                        padding: "5px 10px", fontSize: 12, borderRadius: 14, cursor: "pointer",

                                        color: sel ? "var(--accent-dark)" : "var(--text-secondary)",

                              padding: "6px 14px", fontSize: 11, borderRadius: 14, cursor: "pointer",

                              color: "#fff", fontWeight: 700, fontFamily: "var(--font-body)"

                      </div>

                </Card>

                {/* SECTION 5: Contact */}

    // =====================================================================
    // QUESTIONNAIRE
    // =====================================================================
    function Quiz({ questions, sector, onComplete, assessmentId }) {
      const [idx, setIdx] = useState(0);
      const [answers, setAnswers] = useState({});
      const [selected, setSelected] = useState(null);
      const [finishing, setFinishing] = useState(false);

      const q = questions[idx];
      const dim = q ? DIM[q.dimension] : null;
      const isLast = idx === questions.length - 1;

      const submit = () => {
        if (selected === null) return;
        const opt = q.options.find(o => String(o.value) === String(selected));
        const score = opt ? opt.score : 0;
        const w = (SECTOR_WEIGHTS[sector] || SECTOR_WEIGHTS.smb)[q.dimension] || 1.0;

        // Store answer with score + weight for database
        const newAnswers = {
          ...answers,
          [q.question_id]: { selected, score, weight: w, dimension: q.dimension }
        };
        setAnswers(newAnswers);

        // Save to Supabase (non-blocking)
        updateAnswers(assessmentId, newAnswers);

        if (isLast) {
          setFinishing(true);
          setTimeout(() => {
            // computeResults uses the raw selected values, extract them
            const simpleAnswers = {};
            for (const [k, v] of Object.entries(newAnswers)) {
              simpleAnswers[k] = v.selected !== undefined ? v.selected : v;
            }
            onComplete(computeResults(simpleAnswers, sector));
          }, 1800);
        } else {
          setIdx(idx + 1);
          setSelected(null);
        }
      };

      if (finishing) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ textAlign: "center" }} className="fade-in">
              <div style={{ fontSize: 48, marginBottom: 16, animation: "pulse 1.5s infinite" }}>{"\u2699\uFE0F"}</div>
              <h2 style={{ fontSize: 26, fontWeight: 800, color: "var(--text)", marginBottom: 8, letterSpacing: -0.5 }}>Calculating your exposure...</h2>
              <p style={{ fontSize: 13, color: "var(--text-secondary)" }}>
                Analyzing {Object.keys(answers).length} responses with sector-weighted risk scoring
              </p>
            </div>
          </div>
        );
      }

      if (!q) return null;

      return (
        <div style={{ minHeight: "100vh", padding: "40px 0 60px" }}>
          <Container maxWidth={640}>
            {/* Progress */}
            <div style={{ marginBottom: 32 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>
                  Question {idx + 1} of {questions.length}
                </div>
                <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>
                  {Math.round((idx / questions.length) * 100)}%
                </div>
              </div>
              <div style={{ height: 4, background: "var(--border)", borderRadius: 2, overflow: "hidden" }}>
                <div style={{
                  height: "100%", width: Math.max((idx / questions.length) * 100, 2) + "%",
                  background: "var(--accent)",
                  borderRadius: 2, transition: "width 0.5s ease"
                }} />
              </div>
            </div>

            <div className="slide-up" key={q.question_id}>
              <Card style={{ padding: 0, overflow: "hidden" }}>
                {/* Dimension header */}
                <div style={{
                  padding: "12px 20px", background: dim.color + "08",
                  borderBottom: "1px solid " + dim.color + "15",
                  display: "flex", alignItems: "center", gap: 8
                }}>
                  <span style={{ fontSize: 16 }}>{dim.icon}</span>
                  <span style={{
                    fontSize: 10, fontWeight: 600, color: dim.color,
                    letterSpacing: 1.5, textTransform: "uppercase",
                    fontFamily: "var(--font-mono)"
                  }}>{dim.label}</span>
                  {q.is_future_proofing && (
                    <Badge color="#f59e0b" style={{ marginLeft: "auto", fontSize: 8, padding: "2px 8px" }}>FUTURE-PROOFING</Badge>
                  )}
                </div>

                {/* Question */}
                <div style={{ padding: "24px 20px 16px" }}>
                  <h3 style={{ fontSize: 17, fontWeight: 600, color: "var(--text)", lineHeight: 1.5, marginBottom: 8 }}>
                    {q.text}
                  </h3>
                  {q.help && (
                    <p style={{
                      fontSize: 12, color: "var(--text-muted)", lineHeight: 1.6,
                      padding: "10px 12px", background: "var(--bg-surface)",
                      borderRadius: 2, borderLeft: "2px solid " + dim.color + "40"
                    }}>{q.help}</p>
                  )}
                </div>

                {/* Options */}
                <div style={{ padding: "0 20px 24px" }}>
                  {q.options.map((opt, i) => {
                    const isSel = String(selected) === String(opt.value);
                    return (
                      <button key={i} onClick={() => setSelected(opt.value)} style={{
                        display: "block", width: "100%", padding: "12px 16px 12px 40px",
                        marginBottom: 8, textAlign: "left", cursor: "pointer",
                        background: isSel ? "linear-gradient(135deg, " + dim.color + "18, " + dim.color + "08)" : "var(--bg-surface)",
                        border: "1px solid " + (isSel ? dim.color + "60" : "var(--border)"),
                        borderRadius: 2, color: isSel ? "#f1f5f9" : "#94a3b8",
                        fontSize: 13, transition: "all 0.15s", position: "relative"
                      }}>
                        <div style={{
                          position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)",
                          width: 18, height: 18, borderRadius: "50%",
                          border: "2px solid " + (isSel ? dim.color : "var(--border)"),
                          background: isSel ? dim.color : "transparent",
                          display: "flex", alignItems: "center", justifyContent: "center"
                        }}>
                          {isSel && <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#fff" }} />}
                        </div>
                        {opt.label}
                      </button>
                    );
                  })}
                </div>

                {/* Footer */}
                <div style={{
                  padding: "16px 20px", borderTop: "1px solid var(--border)",
                  display: "flex", justifyContent: "space-between", alignItems: "center"
                }}>
                  <div style={{ fontSize: 11, color: "var(--text-muted)" }}>
                    {Object.keys(answers).length} of {questions.length} answered
                  </div>
                  <Btn onClick={submit} disabled={selected === null}>
                    {isLast ? "Finish & Get Score" : "Next"}
                  </Btn>
                </div>
              </Card>
            </div>
          </Container>
        </div>
      );
    }

                    </div>
                    <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>{g.status}</div>
                    <div style={{ textAlign: "right", fontSize: 16, fontWeight: 800, color: "var(--coral)", fontFamily: "var(--font-mono)" }}>€{g.exposure}M</div>
                  </div>
                ))}
              </Card>

              {/* BOARD ONE-LINER */}
              <Card style={{
                padding: 32, marginBottom: 24,
                background: "var(--text)", border: "none", color: "#fff"
              }}>
                <Label color="var(--accent-light)">Board-ready summary</Label>
                <p style={{ fontSize: 22, fontWeight: 700, color: "#fff", lineHeight: 1.35, letterSpacing: -0.5, marginBottom: 16 }}>
                  "Our current €2.1M cyber investment addresses only 37% of a €{exposureCost}M annual risk exposure. An additional €{budgetGap.toFixed(1)}M phased over 18 months brings us to peer parity and delivers 3.4\u00d7 return in avoided losses."
                </p>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", fontFamily: "var(--font-mono)", letterSpacing: 1 }}>
                  &mdash; One paragraph for your next board meeting
                </div>
              </Card>

              {/* CTA */}
              <div style={{ textAlign: "center", padding: "48px 0 32px" }}>
                <h3 style={{ fontSize: 28, fontWeight: 800, color: "var(--text)", letterSpacing: -0.8, marginBottom: 12 }}>
                  Get your own report in 15 minutes
                </h3>
                <p style={{ fontSize: 15, color: "var(--text-secondary)", marginBottom: 24, maxWidth: 480, margin: "0 auto 24px" }}>
                  Same format, your actual numbers. Walk into your next board meeting with a quantified case for investment.
                </p>
                <Btn onClick={onStart}>Start your assessment</Btn>
              </div>
            </div>
          </Container>
        </div>
      );
    }

    // =====================================================================
    // APP
    // =====================================================================
    function App() {
      const [page, setPage] = useState("landing");
      const [formData, setFormData] = useState(null);
      const [result, setResult] = useState(null);
      const [assessmentId, setAssessmentId] = useState(null);
      const [mode, setMode] = useState(supabase ? "live" : "demo");

      const handleFormSubmit = async (data) => {
        setFormData(data);
        // Save to Supabase
        const id = await saveAssessment(data);
        setAssessmentId(id);
        setPage("quiz");
      };

      const handleComplete = async (res) => {
        setResult(res);
        // Save scores to Supabase
        await completeAssessment(assessmentId, res);
        setPage("results");
      };

      const restart = () => {
        setFormData(null);
        setResult(null);
        setAssessmentId(null);
        setPage("landing");
      };

      return (
        <div>
          <NavBar
            onLogo={restart}
            mode={mode}
            onStart={page === "landing" || page === "sample" ? () => setPage("form") : null}
            onSample={page === "landing" ? () => setPage("sample") : null}
          />
          {page === "landing" && <Landing onStart={() => setPage("form")} onSample={() => setPage("sample")} />}
          {page === "sample" && <SampleReport onBack={() => setPage("landing")} onStart={() => setPage("form")} />}
          {page === "form" && <StartForm onSubmit={handleFormSubmit} onBack={() => setPage("landing")} />}
          {page === "quiz" && formData && (
            <Quiz questions={DEMO_QUESTIONS} sector={formData.sector} onComplete={handleComplete} assessmentId={assessmentId} />
          )}
          {page === "results" && result && <Results result={result} onRestart={restart} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
